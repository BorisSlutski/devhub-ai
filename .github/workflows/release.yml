name: Build & Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag_exists: ${{ steps.check_tag.outputs.exists }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from package.json
        id: version
        run: echo "version=v$(node -p 'require("./package.json").version')" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: check_tag
        run: |
          if git rev-parse "${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

  build-mac:
    needs: check-version
    if: needs.check-version.outputs.tag_exists == 'false'
    runs-on: macos-latest
    env:
      VERSION: ${{ needs.check-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Package macOS app
        run: npm run package

      - name: Create zip archive
        run: |
          cd dist
          zip -r -y "DevHub-AI-mac-${VERSION}.zip" DevHub-AI.app

      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "DevHub-AI" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "DevHub-AI.app" 150 190 \
            --app-drop-link 450 190 \
            --no-internet-enable \
            "dist/DevHub-AI-mac-${VERSION}.dmg" \
            "dist/DevHub-AI.app" || true
          # Fallback to hdiutil if create-dmg fails
          if [ ! -f "dist/DevHub-AI-mac-${VERSION}.dmg" ]; then
            hdiutil create -volname "DevHub-AI" -srcfolder "dist/DevHub-AI.app" -ov -format UDZO "dist/DevHub-AI-mac-${VERSION}.dmg"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DevHub-AI-mac
          path: |
            dist/DevHub-AI-mac-*.zip
            dist/DevHub-AI-mac-*.dmg

  release:
    needs: [check-version, build-mac]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.check-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Create tag
        run: |
          git tag "$VERSION"
          git push origin "$VERSION"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: DevHub-AI-mac

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          generate_release_notes: true
          files: |
            DevHub-AI-mac-*.zip
            DevHub-AI-mac-*.dmg
