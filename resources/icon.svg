<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00e5a0"/>
      <stop offset="100%" style="stop-color:#00b880"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="1024" height="1024" rx="230" fill="url(#bg)"/>

  <!-- Subtle inner highlight -->
  <rect x="4" y="4" width="1016" height="1016" rx="228" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="4"/>

  <!-- DD text -->
  <text x="512" y="620" font-family="ui-monospace, 'SF Mono', 'Menlo', 'Monaco', monospace" font-size="520" font-weight="800" text-anchor="middle" fill="#04060a" filter="url(#shadow)" letter-spacing="-20">DD</text>
</svg>
